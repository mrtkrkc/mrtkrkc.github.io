<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>2D Art Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="3dart.html" class="nav-link top-left">3D ART</a>
        <a href="index.html" class="nav-link top-right" style="color:#ff00ff">HOME</a>
        <a href="projects.html" class="nav-link bottom-left">PROJECTS</a>
        <a href="aboutme.html" class="nav-link bottom-right">ABOUT ME</a>
    </nav>

    <header class="gallery-header">
        <h1>2D ART COLLECTION</h1>
    </header>

    <main class="container">
        <div class="grid">
            <div class="grid-item" onclick="openLbox('images/2dart/resim1.jpg')">
                <img src="images/2dart/resim1.jpg" alt="2D 1">
            </div>
        </div>
    </main>

    <div id="lightbox" onclick="closeLbox()">
        <span class="lightbox-close">BACK</span>
        <img id="lbox-img">
    </div>

    <script>
        function openLbox(s){ document.getElementById('lbox-img').src=s; document.getElementById('lightbox').style.display='flex'; }
        function closeLbox(){ document.getElementById('lightbox').style.display='none'; }
    </script>
</body>
</html>
